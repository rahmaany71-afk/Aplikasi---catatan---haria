<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Catatan Harian</title>
    <style>
        /* Mengatur tampilan dasar halaman */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #333;
            text-align: center;
            font-size: 24px;
        }

        /* Mempercantik kotak teks */
        textarea {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box; /* Agar padding tidak merusak lebar */
        }

        /* Mengatur tombol */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-save {
            background-color: #4CAF50;
            color: white;
        }

        .btn-delete {
            background-color: #f44336;
            color: white;
        }

        button:active {
            transform: scale(0.95); /* Efek membal saat diklik */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Catatan Harianku</h1>
    <textarea id="isiCatatan" rows="8" placeholder="Tulis inspirasimu hari ini..."></textarea>
    
    <div class="btn-group">
        <button class="btn-save" onclick="simpanKeHP()">Simpan</button>
        <button class="btn-delete" onclick="hapusCatatan()">Hapus</button>
    </div>
</div>

<script>
    function simpanKeHP() {
        const data = document.getElementById('isiCatatan').value;
        localStorage.setItem('catatan_user', data);
        alert('Catatan tersimpan di HP!');
    }

    function hapusCatatan() {
        if (confirm('Hapus catatan ini?')) {
            localStorage.removeItem('catatan_user');
            document.getElementById('isiCatatan').value = '';
        }
    }

    window.onload = function() {
        const savedData = localStorage.getItem('catatan_user');
        if (savedData) {
            document.getElementById('isiCatatan').value = savedData;
        }
    };
</script>
<script>
    // Fungsi untuk mendapatkan format tanggal dan waktu sekarang
    function dapatkanWaktu() {
        const sekarang = new Date();
        const opsi = { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        };
        return sekarang.toLocaleDateString('id-ID', opsi);
    }

    function simpanKeHP() {
        const areaTeks = document.getElementById('isiCatatan');
        const tanggalSekarang = dapatkanWaktu();
        
        // Menambahkan label waktu ke dalam teks catatan
        const dataBaru = areaTeks.value + "\n\n--- Disimpan pada: " + tanggalSekarang + " ---\n";
        
        localStorage.setItem('catatan_user', dataBaru);
        areaTeks.value = dataBaru; // Update tampilan di layar
        alert('Catatan dan waktu berhasil disimpan!');
    }

    function hapusCatatan() {
        if (confirm('Hapus semua catatan?')) {
            localStorage.removeItem('catatan_user');
            document.getElementById('isiCatatan').value = '';
        }
    }

    window.onload = function() {
        const savedData = localStorage.getItem('catatan_user');
        if (savedData) {
            document.getElementById('isiCatatan').value = savedData;
        }
    };
</script>

</body>
</html>
