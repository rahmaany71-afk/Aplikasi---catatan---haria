<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Catatan Pro</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; }
        input, textarea { width: 100%; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 5px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-save { background: #1a73e8; color: white; }
        .btn-clear { background: #ea4335; color: white; }
        .note-item { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 5px solid #1a73e8; cursor: pointer; }
        .note-date { font-size: 0.8em; color: #777; }
    </style>
</head>
<body>

<div class="container">
    <h1>Catatan Pro</h1>
    <input type="text" id="judul" placeholder="Judul Catatan">
    <textarea id="isi" rows="5" placeholder="Isi catatan..."></textarea>
    
    <div class="btn-group">
        <button class="btn-save" onclick="tambahCatatan()">Tambah Catatan</button>
        <button class="btn-clear" onclick="hapusSemua()">Kosongkan</button>
    </div>

    <div id="daftarCatatan"></div>
</div>

<script>
    let semuaCatatan = JSON.parse(localStorage.getItem('my_notes')) || [];

    function tambahCatatan() {
        const judul = document.getElementById('judul').value;
        const isi = document.getElementById('isi').value;
        const tanggal = new Date().toLocaleString('id-ID');

        if (judul && isi) {
            const catatanBaru = { judul, isi, tanggal };
            semuaCatatan.push(catatanBaru);
            simpanDanTampil();
            document.getElementById('judul').value = '';
            document.getElementById('isi').value = '';
        } else {
            alert("Judul dan isi tidak boleh kosong!");
        }
    }

    function simpanDanTampil() {
        localStorage.setItem('my_notes', JSON.stringify(semuaCatatan));
        tampilkanDaftar();
    }

    function tampilkanDaftar() {
        const listDiv = document.getElementById('daftarCatatan');
        listDiv.innerHTML = '<h3>Daftar Catatan:</h3>';
        
        semuaCatatan.forEach((item, index) => {
            listDiv.innerHTML += `
                <div class="note-item" onclick="bukaCatatan(${index})">
                    <strong>${item.judul}</strong><br>
                    <span class="note-date">${item.tanggal}</span>
                </div>
            `;
        });
    }

    function hapusSemua() {
        if (confirm("Hapus semua daftar catatan?")) {
            semuaCatatan = [];
            simpanDanTampil();
        }
    }

    function bukaCatatan(index) {
        const c = semuaCatatan[index];
        alert(`JUDUL: ${c.judul}\n\n${c.isi}\n\n(${c.tanggal})`);
    }

    window.onload = tampilkanDaftar;
</script>

</body>
</html>
